aid: keyrunner
name: KeyRunner
description: >-
  KeyRunner is a local-first API platform combining a desktop API client,
  request monitor, mock server, and secret manager. It is delivered as
  desktop applications (Windows, macOS Intel, macOS Apple Silicon), a VS
  Code extension, and a CLI, with all requests and secrets kept inside the
  developer environment.
